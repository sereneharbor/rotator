<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Method 1: HTML Meta Refresh (Fall-back for disabled JS) -->
    <!-- content="0; ..." means redirect after 0 seconds -->
    <meta http-equiv="refresh" content="0; url=https://yohoslot2.com">

    <!-- Method 2: JavaScript Redirect (Faster execution) -->
    <script type="text/javascript">
        window.location.replace("https://yohoslot2.com");
    </script>
</head>
<body>
    <!-- Message for users if the redirect doesn't happen instantly -->
    <p>If you are not redirected automatically, please click this link: 
        <a href="https://yohoslot2.com">Click here to go to yohoslot2.com</a>.
    </p>
</body>
</html>
